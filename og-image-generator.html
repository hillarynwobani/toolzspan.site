<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; }
    .og-card {
      width: 1200px;
      height: 630px;
      background: #0A1628;
      position: relative;
      overflow: hidden;
      padding: 60px 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    /* Decorative circles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(30, 111, 255, 0.08);
    }
    .circle-1 { width: 350px; height: 350px; bottom: -80px; left: -60px; }
    .circle-2 { width: 200px; height: 200px; top: 40px; left: 180px; background: rgba(30, 111, 255, 0.05); }
    /* Decorative squares */
    .squares {
      position: absolute;
      right: 60px;
      top: 50%;
      transform: translateY(-50%);
      display: grid;
      grid-template-columns: 90px 90px;
      gap: 16px;
    }
    .sq {
      width: 90px;
      height: 90px;
      border-radius: 12px;
      transform: rotate(-8deg);
    }
    .sq-1 { background: #1E6FFF; }
    .sq-2 { background: #1E6FFF; opacity: 0.85; }
    .sq-3 { background: #c97b5a; opacity: 0.7; }
    .sq-4 { background: #00C6A7; opacity: 0.6; }
    /* Text */
    .brand {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 30px;
      letter-spacing: -0.5px;
    }
    .brand .toolz { color: #fff; }
    .brand .span { color: #00C6A7; }
    .headline {
      font-size: 82px;
      font-weight: 800;
      color: #fff;
      line-height: 1.05;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }
    .subheadline {
      font-size: 28px;
      color: #a0aec0;
      margin-bottom: 36px;
      font-weight: 400;
    }
    .tags {
      display: flex;
      gap: 14px;
      margin-bottom: 40px;
    }
    .tag {
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid;
    }
    .tag-pdf { color: #1E6FFF; border-color: #1E6FFF; }
    .tag-video { color: #00C6A7; border-color: #00C6A7; }
    .tag-image { color: #e6a547; border-color: #e6a547; }
    .tag-gif { color: #7c6fe0; border-color: #7c6fe0; }
    .footer-text {
      font-size: 16px;
      color: #64748b;
      letter-spacing: 0.5px;
    }
    .domain {
      position: absolute;
      bottom: 40px;
      right: 70px;
      font-size: 20px;
      font-weight: 700;
      color: #00C6A7;
    }
  </style>
</head>
<body>
  <div class="og-card">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
    <div class="squares">
      <div class="sq sq-1"></div>
      <div class="sq sq-2"></div>
      <div class="sq sq-3"></div>
      <div class="sq sq-4"></div>
    </div>
    <div class="brand"><span class="toolz">Toolz</span><span class="span">span</span></div>
    <div class="headline">50+ Free Online Tools</div>
    <div class="subheadline">Convert, Compress, Edit — No Sign-Up Required</div>
    <div class="tags">
      <span class="tag tag-pdf">PDF Tools</span>
      <span class="tag tag-video">Video Audio</span>
      <span class="tag tag-image">Image Tools</span>
      <span class="tag tag-gif">GIF Tools</span>
    </div>
    <div class="footer-text">Fast • Secure • Works on Any Device • 100% Free Forever</div>
    <div class="domain">toolzspan.site</div>
  </div>
</body>
</html>
