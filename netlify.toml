[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static site - functions deploy automatically'"

[functions]
  node_bundler = "esbuild"
  # Pull native binary deps out of the bundle (FFmpeg, LibreOffice wrapper, qpdf)
  external_node_modules = [
    "@ffmpeg-installer/ffmpeg",
    "fluent-ffmpeg",
    "libreoffice-convert",
    "node-qpdf2",
    "pdfjs-dist"
  ]
  # Free tier hard limit is 10s. Pro raises to 26s. Set 26 here so when user upgrades, no config change needed.
  timeout = 26
  # Bundle tmp uploads from /tmp (Netlify allows 512MB ephemeral /tmp)
  included_files = []

# Redirect old watermark URL to 404
[[redirects]]
  from = "/tools/remove-watermark-from-pdf.html"
  to = "/404.html"
  status = 410

# Redirect old pptx URL to new name
[[redirects]]
  from = "/tools/pptx-to-pdf.html"
  to = "/tools/powerpoint-to-pdf.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
