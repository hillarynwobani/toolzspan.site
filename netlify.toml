[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static site - functions deploy automatically'"

[functions]
  node_bundler = "esbuild"
  # Pull native binary deps out of the bundle (FFmpeg, LibreOffice wrapper, qpdf)
  external_node_modules = [
    "@ffmpeg-installer/ffmpeg",
    "fluent-ffmpeg",
    "libreoffice-convert",
    "node-qpdf2",
    "pdfjs-dist"
  ]
  # Free tier hard limit is 10s. Pro raises to 26s. Set 26 here so when user upgrades, no config change needed.
  timeout = 26
  # Bundle tmp uploads from /tmp (Netlify allows 512MB ephemeral /tmp)
  included_files = []

# Redirect old watermark URL to 404
[[redirects]]
  from = "/tools/remove-watermark-from-pdf.html"
  to = "/404.html"
  status = 410

# Redirect old pptx URL to new name
[[redirects]]
  from = "/tools/pptx-to-pdf.html"
  to = "/tools/powerpoint-to-pdf.html"
  status = 301

# Netlify post-processing: minify CSS/JS/HTML on deploy.
# Saves ~3 KiB on style.css per PageSpeed and removes whitespace
# from JSON-LD blocks too. No source-file change required.
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = true

[build.processing.js]
  bundle = false
  minify = true

[build.processing.html]
  pretty_urls = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Early-hint preload: browser starts /css/style.css fetch on
    # response-headers parse, before the HTML body arrives.
    # Shaves ~50-150ms off the HTML->CSS critical-path chain
    # flagged by PageSpeed "Network dependency tree".
    Link = "</css/style.css>; rel=preload; as=style"

# Long cache for static assets (images, fonts, SVG).
# These rarely change; if they do, rename the file or add ?v=N in HTML.
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Medium cache for CSS/JS. 30 days satisfies PageSpeed's
# "efficient cache lifetimes" threshold while still letting an
# urgent fix reach users within a month. For instant cache-bust
# on critical updates, append ?v=N to the link/script tags.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

# HTML: short cache + revalidate so deploys are visible immediately.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
