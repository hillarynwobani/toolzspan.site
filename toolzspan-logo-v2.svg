<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E6FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C6A7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0A1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="spanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1E6FFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C6A7;stop-opacity:1" />
    </linearGradient>
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1E6FFF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Icon Mark: Document + Wrench fusion -->
  <!-- Document base -->
  <rect x="12" y="10" width="52" height="66" rx="6" ry="6" fill="url(#iconGrad)" filter="url(#iconShadow)"/>
  <!-- Document fold corner -->
  <polygon points="46,10 64,28 46,28" fill="white" opacity="0.25"/>
  <polygon points="46,10 64,10 64,28" fill="white" opacity="0.15"/>

  <!-- Document lines inside -->
  <rect x="20" y="36" width="28" height="3.5" rx="1.75" fill="white" opacity="0.85"/>
  <rect x="20" y="44" width="22" height="3.5" rx="1.75" fill="white" opacity="0.65"/>
  <rect x="20" y="52" width="26" height="3.5" rx="1.75" fill="white" opacity="0.5"/>

  <!-- Wrench overlaid bottom-right of icon -->
  <g transform="translate(40, 48) rotate(-35)">
    <circle cx="0" cy="0" r="10" fill="white" opacity="0.95"/>
    <circle cx="0" cy="0" r="5.5" fill="url(#iconGrad)"/>
    <rect x="-3.5" y="8" width="7" height="22" rx="3.5" fill="white" opacity="0.95"/>
  </g>

  <!-- Spark accent -->
  <polygon points="58,12 62,20 66,14 60,22 64,30 58,22 54,28 60,20"
           fill="#FFD93D" opacity="0.9" transform="translate(-8, -4) scale(0.7)"/>

  <!-- Wordmark -->
  <text font-family="'Georgia', 'Times New Roman', serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1.5"
        x="82" y="72"
        fill="url(#textGrad)">Toolz</text>

  <text font-family="'Georgia', 'Times New Roman', serif"
        font-size="46"
        font-weight="700"
        letter-spacing="-1.5"
        x="218" y="72"
        fill="url(#spanGrad)">span</text>

  <!-- Tagline — updated -->
  <text font-family="'Trebuchet MS', 'Lucida Sans', sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="2.8"
        x="83" y="93"
        fill="#6B8099"
        text-anchor="start">ALL-IN-ONE FREE ONLINE TOOLS</text>

  <!-- Thin accent underline -->
  <rect x="82" y="80" width="380" height="2" rx="1" fill="url(#spanGrad)" opacity="0.35"/>
</svg>
